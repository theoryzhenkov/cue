<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="./public/cue-256x256-cue-theor-net.png">
    <link rel="apple-touch-icon" href="./public/cue-256x256-cue-theor-net.png">
    <title>Cue · cue.theor.net</title>
    <script>
        // Apply theme before CSS to avoid a flash. Default: dark.
        (function () {
            var t = localStorage.getItem('cue-theme');
            t = (t === 'light' || t === 'dark') ? t : 'dark';
            var r = document.documentElement;
            r.setAttribute('data-theme', t);
            r.style.colorScheme = t;
        })();
    </script>
    <style>
        /* Fonts — vendored from the home (theornet) site for visual harmony.
           Source Serif 4 (SIL OFL) + Commit Mono. Licenses in public/fonts/licenses/. */
        @font-face {
            font-family: 'Source Serif 4';
            font-style: normal;
            font-weight: 200 900;
            font-display: swap;
            src: url('/fonts/source-serif-4/SourceSerif4Variable-Roman.woff2') format('woff2-variations');
        }
        @font-face {
            font-family: 'Source Serif 4';
            font-style: italic;
            font-weight: 200 900;
            font-display: swap;
            src: url('/fonts/source-serif-4/SourceSerif4Variable-Italic.woff2') format('woff2-variations');
        }
        @font-face {
            font-family: 'Commit Mono';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('/fonts/commit-mono/CommitMono-400.otf') format('opentype');
        }
        @font-face {
            font-family: 'Commit Mono';
            font-style: normal;
            font-weight: 500;
            font-display: swap;
            src: url('/fonts/commit-mono/CommitMono-500.otf') format('opentype');
        }
        @font-face {
            font-family: 'Commit Mono';
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url('/fonts/commit-mono/CommitMono-600.otf') format('opentype');
        }
        @font-face {
            font-family: 'Commit Mono';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url('/fonts/commit-mono/CommitMono-700.otf') format('opentype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        /* Page background per theme (instant, no flash before ui.css loads). */
        html { background-color: #1A1918; }
        html[data-theme='light'] { background-color: #F4F4F2; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            /* Leave room for controls bar */
            padding-bottom: 100px;
        }
        canvas {
            /* CSS transform scaling is applied via JS */
            border: 1px solid #CFCFC7;
            border-radius: 2px;
            /* Lift the artwork off the warm desk, matching the home paper shadow */
            box-shadow: 0 1px 2px rgba(30, 33, 38, 0.05), 0 10px 28px -10px rgba(30, 33, 38, 0.16);
            /* Smooth scaling */
            image-rendering: auto;
        }
        
        /* Hide canvas initially until generation */
        canvas {
            opacity: 0;
            transition: opacity 100ms ease-out;
        }
        canvas.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <main></main>
    <script type="module" src="/src/sketch.ts"></script>
</body>
</html>
